<script>
    let arr = [23, 34, 77, 98, 68];
    let sum = 0;
    for (let i = 0; i < arr.length - 1; i++) {
        sum += arr[i];
    }

    let avg = sum / arr.length;

    console.log(avg);

    if( 90 <= avg  && avg <= 100){
        console.log("Grade: A");
    }else if( 80 <= avg  && avg <= 90){
         console.log("Grade: B");
    }
    else if( 70 <= avg  && avg <= 80){
         console.log("Grade: C");
    }
    else if( 60 <= avg  && avg <= 70){
         console.log("Grade: D");
    }
    else if( 50 <= avg  && avg <= 60){
         console.log("Grade: E");
    }else{
        console.log("Grade: Fail");
    }
</script>
