<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks & Grade Calculator</title>
    <link rel="stylesheet" href="student_reportCard.css">
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>
    
    <div class="form-group">
        <label for="numSubjects">Enter Number of Subjects:</label>
        <input type="number" id="numSubjects" min="1" placeholder="e.g., 5">
        <button onclick="generateSubjectInputs()">Generate Mark Fields</button>
    </div>

    <div id="marksInputsContainer"></div>


    <button id="calculateBtn" style="display: none;" onclick="calculateResults()">Calculate Grade</button>


    <div id="result" class="result-box">
        <div class="result-item"><strong>Total Marks:</strong> <span id="resTotal"></span></div>
        <div class="result-item"><strong>Percentage / Average:</strong> <span id="resAverage"></span>%</div>
        <div class="result-item"><strong>Grade:</strong> <span id="resGrade"></span></div>
        <div class="result-item"><strong>Status:</strong> <span id="resStatus"></span></div>
    </div>
</div>

<script src="student_reportCard.js"></script>
</body>
</html>
